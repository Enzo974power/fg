<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PRONOTE - Espace élèves - Metice Réunion</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    margin:0;
    padding:0;
    background: linear-gradient(135deg,#141e30,#243b55);
    color:white;
}

h1{
    margin-top:40px;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    background:#00ff88;
    transition:0.2s;
}

button:hover{
    transform:scale(1.1);
    background:#00cc6a;
}

input{
    padding:10px;
    font-size:16px;
}

#content{
    animation:fade 1s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

#fullImage{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:contain;
background:black;
z-index:9999;
}

</style>
</head>


<body>

<h1>Bienvenue sur FG</h1>
<p>Site pour les amis</p>

<div id="loginDiv">
<input type="password" id="mdpInput" placeholder="Mot de passe">
<button onclick="verifierMDP()">Valider</button>
</div>


<div id="content" style="display:none">

<input type="text" id="searchBar" placeholder="Rechercher un jeu..." onkeyup="searchGames()">

<hr>

<h2>🔥 Multijoueur</h2>

<button onclick="window.open('https://bloxd.io/','_blank')">Bloxd</button>
<button onclick="window.open('https://shellshock.io/','_blank')">ShellShock</button>
<button onclick="window.open('https://ev.io/','_blank')">Ev.io</button>
<button onclick="window.open('https://deadshot.io/','_blank')">Deadshot</button>
<button onclick="window.open('https://zombsroyale.io/','_blank')">Zombs Royale</button>

<hr>

<h2>🎮 Jeux .io</h2>

<button onclick="window.open('https://slither.io/','_blank')">Slither</button>
<button onclick="window.open('https://agar.io/','_blank')">Agar</button>
<button onclick="window.open('https://splix.io/','_blank')">Splix</button>
<button onclick="window.open('https://paper-io.com/','_blank')">Paper.io</button>

<hr>

<h2>⚽ Fun</h2>

<button onclick="window.open('https://smashkarts.io/','_blank')">Smash Karts</button>
<button onclick="window.open('https://slowroads.io/','_blank')">Slow Roads</button>
<button onclick="window.open('https://basketbros.io/','_blank')">Basket Bros</button>

<hr>

<h2>🧠 Réflexion</h2>

<button onclick="window.open('https://play2048.co/','_blank')">2048</button>
<button onclick="window.open('https://tetris.com/play-tetris','_blank')">Tetris</button>
<button onclick="window.open('https://minesweeper.online/','_blank')">Démineur</button>

<hr>

<h2>📱 Vidéos</h2>

<button onclick="window.open('https://youtube.com','_blank')">YouTube</button>
<button onclick="window.open('https://tiktok.com','_blank')">TikTok</button>

</div>


<script>

const mdp1="azerty!"
const mdp2="Tipitou974!"
const mdp3="000"

function verifierMDP(){

let saisie=document.getElementById("mdpInput").value

if(saisie===mdp1 || saisie===mdp2 || saisie===mdp3){

document.getElementById("loginDiv").style.display="none"
document.getElementById("content").style.display="block"

}

else{

alert("Mot de passe incorrect")

}

}


function searchGames(){

let input=document.getElementById("searchBar")
let filter=input.value.toLowerCase()
let buttons=document.getElementsByTagName("button")

for(let i=0;i<buttons.length;i++){

let txt=buttons[i].textContent

if(txt.toLowerCase().indexOf(filter)>-1){

buttons[i].style.display=""

}

else{

buttons[i].style.display="none"

}

}

}


document.addEventListener("keydown",function(event){

if(event.key==="Enter"){

let existing=document.getElementById("fullImage")

if(existing){

existing.remove()

}

else{

let img=document.createElement("img")

img.src="surprise.png"
img.id="fullImage"

document.body.appendChild(img)

}

}

})

</script>

</body>
</html>
